<h2>Historique de l'épargne</h2>

<button mat-flat-button color="primary" (click)="addNewRow()">
    <mat-icon>add</mat-icon>
    Ajouter une saisie
</button>

<ag-grid-angular style="width: 100%; height: 600px;" class="ag-theme-alpine" [rowData]="rowData()"
    [gridOptions]="gridOptions" [columnDefs]="columnDefs" [defaultColDef]="defaultColDef" [domLayout]="'autoHeight'" (gridReady)="onGridReady($event)"
    (cellValueChanged)="onCellValueChanged($event)">
</ag-grid-angular>
