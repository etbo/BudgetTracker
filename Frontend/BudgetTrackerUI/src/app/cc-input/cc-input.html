<div class="page-container">
  <div class="header-section">
    <h2>Importation de données</h2>

    <div class="button-bar">
      <button mat-flat-button color="primary" (click)="fileInput.click()" [disabled]="isUploading()">
        <mat-icon>cloud_upload</mat-icon> Charger des fichiers
      </button>
      <p *ngIf="uploadStatus()" class="text-sm text-gray-600 align-center flex items-center">{{ uploadStatus() }}</p>
    </div>
  </div>

  <input type="file" (change)="onFileSelected($event)" #fileInput multiple hidden>

  <div class="grid-section">
    <ag-grid-angular style="width: 100%; height: 100%;" [rowData]="allRowData()" [columnDefs]="columnDefs"
      [defaultColDef]="defaultColDef" (gridReady)="onGridReady($event)" class="ag-theme-alpine">
    </ag-grid-angular>
  </div>
</div>
