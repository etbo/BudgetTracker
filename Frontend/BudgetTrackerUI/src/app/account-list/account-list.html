<div class="page-container">
  <div class="header-section">
    <h2>Gestion des Comptes</h2>

    <div class="button-bar">
      <button mat-flat-button color="primary" (click)="addAccount()">
        <mat-icon>add</mat-icon>
        Ajouter un compte
      </button>
    </div>
  </div>

  <div class="grid-section">
    <ag-grid-angular style="width: 100%; height: 100%;" class="ag-theme-alpine" [columnDefs]="columnDefs"
      [defaultColDef]="defaultColDef" [rowData]="accounts()" [domLayout]="'normal'" [gridOptions]="gridOptions"
      (cellValueChanged)="onCellValueChanged($event)">
    </ag-grid-angular>
  </div>
</div>
