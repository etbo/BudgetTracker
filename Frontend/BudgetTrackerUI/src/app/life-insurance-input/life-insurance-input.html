<h2 mat-dialog-title>Nouvelle Saisie de Relevé</h2>

<mat-dialog-content>
    <div style="display: flex; justify-content: space-between; align-items: center; margin: 10px 0 20px 0;">
        <div style="display: flex; gap: 15px; align-items: center;">
            
            <mat-form-field appearance="outline" subscriptSizing="dynamic" style="width: 280px;">
                <mat-label>Contrat</mat-label>
                <mat-select [ngModel]="selectedAccountId()" (ngModelChange)="onAccountChange($event)">
                    <mat-option *ngFor="let acc of accounts()" [value]="acc.id">
                        {{ acc.owner }} - {{ acc.name }}
                    </mat-option>
                </mat-select>
            </mat-form-field>

            <mat-form-field appearance="outline" subscriptSizing="dynamic" style="width: 200px;">
                <mat-label>Date du relevé</mat-label>
                <input matInput [matDatepicker]="picker" [ngModel]="saisieDate()" (ngModelChange)="saisieDate.set($event)">
                <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
                <mat-datepicker #picker></mat-datepicker>
            </mat-form-field>

        </div>

        <button mat-stroked-button color="primary" (click)="addLine()">
            <mat-icon>add</mat-icon> Ajouter un actif
        </button>
    </div>

    <ag-grid-angular style="width: 100%; height: 350px;" class="ag-theme-alpine" 
        [gridOptions]="gridOptions"
        [columnDefs]="columnDefs" 
        [rowData]="rowData()" 
        [singleClickEdit]="true"
        (cellValueChanged)="onCellValueChanged($event)">
    </ag-grid-angular>

    <div style="text-align: right; margin-top: 20px; font-size: 1.3em; color: #2c3e50;">
        Total valorisation : <strong>{{ totalSaisie() | currency:'EUR' }}</strong>
    </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button (click)="dialogRef.close()">Annuler</button>
    <button mat-flat-button color="primary" (click)="onSave()">
        Enregistrer le relevé
    </button>
</mat-dialog-actions>
