<div class="app-wrapper">
  <mat-toolbar class="app-toolbar" [class.test-mode]="selectedDatabase === 'Test'">
    <button mat-icon-button (click)="toggleDrawer()">
      <mat-icon>menu</mat-icon>
    </button>
    <span class="app-brand">BudgetTracker</span>
    <span class="spacer"></span>
    <mat-button-toggle-group 
      [value]="selectedDatabase" 
      (change)="onDatabaseChange($event.value)"
      class="db-selector-group">
      <mat-button-toggle value="Prod">Production</mat-button-toggle>
      <mat-button-toggle value="Test">Test</mat-button-toggle>
    </mat-button-toggle-group>
    <button mat-icon-button 
          color="accent" 
          (click)="onExportDatabase()" 
          matTooltip="Sauvegarder la base de données (ZIP)">
    <mat-icon>save_alt</mat-icon>
  </button>
  </mat-toolbar>

  <mat-sidenav-container class="sidenav-container">
    <mat-sidenav mode="side" [opened]="isDrawerOpen" class="app-sidenav">
      <app-nav-menu></app-nav-menu>
    </mat-sidenav>

    <mat-sidenav-content class="main-content-area">
      <div class="main-content">
        <router-outlet></router-outlet>
      </div>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
